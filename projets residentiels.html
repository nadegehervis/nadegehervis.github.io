<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>projets residentiels - Nadège Hervis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
 margin: 0;
 font-family: "Helvetica Neue", sans-serif;
 background: #111;
 color: white;
}

header {
 position: fixed;
 width: 100%;
 background: rgba(0,0,0,0.6);
 padding: 15px;
 text-align: center;
 z-index: 1000;
}

header a {
 color: white;
 text-decoration: none;
 margin: 0 10px;
 font-weight: 300;
}

.hero {
 height: 100vh;
 background: url('images/maison1.jpg') center/cover;
}

.container {
 max-width: 900px;
 margin: auto;
 padding: 60px 20px;
}

h1 {
 font-weight: 300;
}

.details {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 margin-top: 30px;
}

.gallery {
 display: grid;
 grid-template-columns: repeat(2, 1fr);
}

.gallery img {
 width: 100%;
 cursor: pointer;
}

footer {
 text-align: center;
 padding: 40px;
}

button {
 padding: 10px 20px;
 background: white;
 color: black;
 border: none;
 cursor: pointer;
}

/* MODAL plein écran */

#modal {
 display: none;
 position: fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:black;
 justify-content:center;
 align-items:center;
}

#modal img {
 max-width:90%;
 max-height:90%;
}

</style>
</head>

<body>

<header>
 <a href="index.html">Accueil</a>
</header>

<div class="hero"></div>

<div class="container">

<h1>Maison contemporaine</h1>

<p>
Projet de conception d'une maison individuelle moderne,
alliant volumes épurés et lumière naturelle.
</p>

<div class="details">
 <div><strong>Lieu :</strong> Niort</div>
 <div><strong>Année :</strong> 2024</div>
 <div><strong>Surface :</strong> 180 m²</div>
 <div><strong>Mission :</strong> Conception complète</div>
</div>

<br><br>

<a href="documents/maison.pdf" target="_blank">
 <button>Voir le projet en PDF</button>
</a>

</div>

<div class="gallery">

<img src="images/maison1.jpg" onclick="openModal(this)">
<img src="images/maison2.jpg" onclick="openModal(this)">
<img src="images/maison3.jpg" onclick="openModal(this)">
<img src="images/maison4.jpg" onclick="openModal(this)">

</div>

<footer>
© Nadège Hervis
</footer>

<div id="modal" onclick="closeModal()">
 <img id="modal-img">
</div>

<script>
function openModal(img) {
 document.getElementById("modal").style.display = "flex";
 document.getElementById("modal-img").src = img.src;
}

function closeModal() {
 document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
